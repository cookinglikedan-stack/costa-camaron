<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Flyer — Costa Camarón Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #a61317;
      --secondary: #355e9e;
      --dark: #1b1c1c;
      --text-variant: #5a403d;
      --outline: #8f706c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Work Sans', sans-serif;
    }

    .flyer {
      background: #ffffff;
      width: 500px;
      padding: 60px 40px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 30px 100px rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .flyer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .logo-area {
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
    }

    .brand-logo {
      height: 120px;
      width: auto;
      object-fit: contain;
    }

    .marketing-text h1 {
      font-size: 28px;
      color: var(--dark);
      margin-bottom: 15px;
      line-height: 1.2;
    }

    .marketing-text p {
      font-size: 16px;
      color: var(--text-variant);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .qr-container {
      background: var(--primary);
      padding: 25px;
      border-radius: 24px;
      display: inline-block;
      box-shadow: 0 15px 40px rgba(166, 19, 23, 0.3);
      transition: transform 0.3s ease;
    }

    .qr-container img {
      display: block;
      width: 200px;
      height: 200px;
      border-radius: 8px;
    }

    .qr-label {
      margin-top: 40px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 14px;
    }

    .footer-info {
      margin-top: 50px;
      font-size: 13px;
      color: var(--outline);
    }

    /* Print settings */
    @media print {
      body { background: white; }
      .flyer { box-shadow: none; border: 1px solid #eee; }
    }
  </style>
</head>
<body>

  <div class="flyer">
    <div class="logo-area">
      <img src="assets/logo.png" alt="Costa Camarón Logo" class="brand-logo">
    </div>

    <div class="marketing-text">
      <h1>¡Tu sabor favorito merece ser compartido!</h1>
      <p>Escanea este código y cuéntanos qué tal estuvo tu experiencia. Tu recomendación nos ayuda a seguir trayendo lo mejor del mar a Aguascalientes.</p>
    </div>

    <div class="qr-container">
      <!-- Direct Google Review Link - Double Encoded to ensure valid URL interpretation -->
      <a href="https://www.google.com/maps/place/Costa+Camar%C3%B3n/@21.9110908,-102.3313939,17z/data=!3m1!4b1!4m6!3m5!1s0x8429efbf9927a8cb:0x940bfd4f4219c4e0!8m2!3d21.9110908!4d-102.328819!16s%2Fg%2F11sh1wrdxh?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener noreferrer">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https%3A%2F%2Fwww.google.com%2Fmaps%2Fplace%2FCosta%2BCamar%25C3%25B3n%2F%4021.9110908%2C-102.3313939%2C17z%2Fdata%3D%213m1%214b1%214m6%213m5%211s0x8429efbf9927a8cb%3A0x940bfd4f4219c4e0%218m2%213d21.9110908%214d-102.328819%2116s%252Fg%252F11sh1wrdxh%3Fentry%3Dttu%26g_ep%3DEgoyMDI2MDUyMC4wIKXMDSoASAFQAw%253D%253D&color=ffffff&bgcolor=a61317" alt="Google Review QR Code">
      </a>
    </div>

    <div class="qr-label">Escanea para dejar tu reseña</div>

    <div class="footer-info">
      📍 Costa Camarón Marisquería | Aguascalientes
    </div>
  </div>

</body>
</html>
